# Vulcan — Local Development Services
# Usage: make up (or docker compose up -d)

services:
  postgres:
    image: postgres:16-alpine
    container_name: vulcan-db
    environment:
      POSTGRES_DB: vulcan
      POSTGRES_USER: vulcan
      POSTGRES_PASSWORD: vulcan_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulcan"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vulcan-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@vulcan.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
